<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VOYAGER - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="login_style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" />
  </head>
  <body>
    <div class="page-wrapper">
      <div class="login-card">

        <div class="brand">
          <div class="brand-name">VOYAGER</div>
          <div class="brand-tagline">Plan. Explore. Discover.</div>
        </div>

        <div class="divider">
          <div class="divider-line"></div>
          <span class="divider-text">Welcome Back</span>
          <div class="divider-line"></div>
        </div>

        <!-- server error banner (hidden by default) -->
        <div class="server-error" id="serverError"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
          <div class="form-group" id="emailGroup">
            <label for="email">Email</label>
            <div class="input-wrapper">
              <span class="input-icon"><i class="fa-regular fa-envelope"></i></span>
              <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
            </div>
            <div class="error-msg" id="emailError">Please enter a valid email.</div>
          </div>

          <div class="form-group" id="passwordGroup">
            <label for="password">Password</label>
            <div class="input-wrapper">
              <span class="input-icon"><i class="fa-solid fa-lock"></i></span>
              <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" />
              <button type="button" class="toggle-pw" onclick="togglePassword()" id="toggleBtn" title="Show/hide password">
                <i class="fa-regular fa-eye" id="eyeIcon"></i>
              </button>
            </div>
            <div class="error-msg" id="passwordError">Password must be at least 6 characters.</div>
          </div>

          <div class="form-extras">
            <label class="remember-me">
              <input type="checkbox" id="rememberMe" />
              Remember me
            </label>
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>

          <button type="submit" class="btn-login" id="loginBtn">LOG IN</button>
        </form>

        <div class="or-divider">
          <span></span>
          <span class="or-text">OR CONTINUE WITH</span>
          <span></span>
        </div>

        <div class="social-row">
          <button class="btn-social" onclick="socialLogin('Google')">
            <i class="fa-brands fa-google"></i> Google
          </button>
          <button class="btn-social" onclick="socialLogin('Facebook')">
            <i class="fa-brands fa-facebook"></i> Facebook
          </button>
        </div>

        <div class="signup-text">
          Don't have an account? <a href="/register">Sign up free</a>
        </div>

      </div>
    </div>
    <script src="login_script.js"></script>
  </body>
</html>
